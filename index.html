<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superando-se - Prof. Lucas Silva</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Maps para carregar bibliotecas via CDN -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    
    <!-- Babel para compilar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-gray-100 font-sans selection:bg-purple-300">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, getDoc } from 'firebase/firestore';
        import { Triangle, Square, Circle, Hexagon, Trophy, Users, Play, Loader2, Key, CheckCircle2, XCircle, Beaker, BookOpen, GraduationCap, Settings } from 'lucide-react';

        // --- CONFIGURAÇÃO FIREBASE ---
        const myFirebaseConfig = {
            apiKey: "AIzaSyCQg38W6tun8YK9QALtnL1AAkUlV5q-dVs",
            authDomain: "superando-se.firebaseapp.com",
            projectId: "Superando", 
            storageBucket: "superando-se.firebasestorage.app",
            messagingSenderId: "635704160880",
            appId: "1:635704160880:web:bf03fbddcabdf527a63ab5",
            measurementId: "G-8ZXRL0SVRE"
        };

        let app, auth, db, appId;
        try {
            const finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
            app = initializeApp(finalConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            // Definir appId consistente para as regras do Firestore
            appId = typeof __app_id !== 'undefined' ? __app_id : 'superando-app';
        } catch (error) {
            console.error("Erro Crítico Firebase:", error);
        }

        const SHAPE_COLORS = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
        const SHAPE_ICONS = [Triangle, Hexagon, Circle, Square];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [initError, setInitError] = useState('');
            
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('pin')) setView('student');
            }, []);

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Erro Autenticação:", err);
                        setInitError("Falha na ligação ao Firebase. Verifique se o login anónimo está ativo.");
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            if (initError) {
                return (
                    <div className="min-h-screen bg-red-900 flex flex-col items-center justify-center text-white p-6 text-center">
                        <XCircle className="w-20 h-20 mb-6 text-red-300" />
                        <h1 className="text-2xl font-bold mb-4 italic uppercase tracking-tighter">Erro de Ligação</h1>
                        <p className="bg-red-800/50 p-6 rounded-2xl border border-red-700 max-w-md">{initError}</p>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-purple-900 flex flex-col items-center justify-center text-white">
                        <Loader2 className="w-16 h-16 animate-spin mb-4 opacity-50" />
                        <p className="font-bold tracking-widest uppercase text-xs opacity-70">A carregar...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen transition-all duration-500">
                    {view === 'home' && <HomeView setView={setView} />}
                    {view === 'host' && <HostView user={user} onExit={() => setView('home')} />}
                    {view === 'student' && <StudentView user={user} onExit={() => setView('home')} />}
                </div>
            );
        }

        function HomeView({ setView }) {
            return (
                <div className="min-h-screen bg-purple-600 flex flex-col items-center justify-center p-4 text-white">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center border-b-8 border-gray-200">
                        <div className="flex justify-center mb-6">
                            <div className="bg-purple-100 p-6 rounded-full">
                                <GraduationCap className="w-16 h-16 text-purple-600" />
                            </div>
                        </div>
                        <h1 className="text-5xl font-black text-gray-800 mb-2 tracking-tighter italic">Superando-se</h1>
                        <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mb-10 leading-tight">
                            uma proposta do professor<br/>Lucas Sebastião Barbosa Silva
                        </p>
                        
                        <div className="space-y-4">
                            <button onClick={() => setView('student')} className="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-5 rounded-2xl shadow-[0_6px_0_rgb(30,64,175)] active:translate-y-1 active:shadow-none transition-all text-2xl uppercase tracking-tighter">
                                Jogar
                            </button>
                            <button onClick={() => setView('host')} className="w-full bg-purple-100 hover:bg-purple-200 text-purple-700 font-black py-4 rounded-2xl transition-all text-lg uppercase tracking-tight">
                                Sou Professor
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function HostView({ user, onExit }) {
            const [step, setStep] = useState('setup');
            const [apiKey, setApiKey] = useState('');
            const [keyStatus, setKeyStatus] = useState('idle');
            const [activeModel, setActiveModel] = useState(null);
            const [discipline, setDiscipline] = useState('');
            const [generalContent, setGeneralContent] = useState('');
            const [specificContent, setSpecificContent] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [timePerQuestion, setTimePerQuestion] = useState(20);
            const [examModel, setExamModel] = useState('ENEM');
            const [difficultyLevel, setDifficultyLevel] = useState('Ensino Médio');
            const [numQuestions, setNumQuestions] = useState(5);
            const [game, setGame] = useState(null);
            const [players, setPlayers] = useState([]);
            const [timeRemaining, setTimeRemaining] = useState(0);

            const testApiKey = async () => {
                if (!apiKey.trim()) return setErrorMsg("Introduza a sua chave Gemini.");
                setKeyStatus('testing');
                setErrorMsg('');
                const models = ['gemini-2.5-flash', 'gemini-1.5-pro', 'gemini-1.5-flash'];
                let working = null;
                for (const m of models) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}?key=${apiKey.trim()}`);
                        if (res.ok) { working = m; break; }
                    } catch (e) {}
                }
                if (working) { setActiveModel(working); setKeyStatus('valid'); }
                else { setKeyStatus('invalid'); setErrorMsg("A chave Gemini não é válida."); }
            };

            const generateQuestions = async () => {
                if (!activeModel || keyStatus !== 'valid') return setErrorMsg("Valide a chave Gemini primeiro.");
                if (!discipline || !generalContent || !specificContent) return setErrorMsg("Preencha todos os campos do assunto.");
                
                setIsGenerating(true);
                setErrorMsg('');

                const prompt = `Atue como professor especialista de "${discipline}". Gere ${numQuestions} questões de múltipla escolha para o nível "${difficultyLevel}", estilo "${examModel}". 
                Assunto Geral: "${generalContent}". Específico: "${specificContent}". 
                Retorne ESTRITAMENTE um array JSON: [{"question": "...", "options": ["A","B","C","D"], "correctIndex": 0}]. Não use markdown.`;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 30000); // 30 segundos de timeout

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        signal: controller.signal,
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    clearTimeout(timeoutId);

                    if (!res.ok) {
                        const errorData = await res.json();
                        throw new Error(errorData.error?.message || "Erro na API Gemini.");
                    }

                    const data = await res.json();
                    let rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("A IA não retornou texto.");

                    // Limpeza agressiva de JSON
                    const jsonMatch = rawText.match(/\[.*\]/s);
                    const cleanJson = jsonMatch ? jsonMatch[0] : rawText;
                    const questions = JSON.parse(cleanJson);

                    const pin = Math.floor(100000 + Math.random() * 900000).toString();
                    const gameData = {
                        pin, hostId: user.uid, status: 'lobby', questions, 
                        currentQuestionIndex: 0, timePerQuestion: Number(timePerQuestion),
                        createdAt: Date.now(), context: { discipline, generalContent }
                    };

                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), gameData);
                    setGame(gameData);
                    setStep('lobby');
                } catch (err) {
                    console.error(err);
                    setErrorMsg(err.name === 'AbortError' ? "A IA demorou muito a responder." : "Erro ao gerar: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            useEffect(() => {
                if (!game?.pin) return;
                const unsubGame = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), (snap) => {
                    if (snap.exists()) setGame(snap.data());
                });

                const unsubPlayers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                    setPlayers(snap.docs.map(d => d.data()).filter(p => p.gameId === game.pin));
                });

                return () => { unsubGame(); unsubPlayers(); };
            }, [game?.pin]);

            useEffect(() => {
                let interval;
                if (game?.status === 'question' && game?.endTime) {
                    interval = setInterval(() => {
                        const left = Math.max(0, Math.ceil((game.endTime - Date.now()) / 1000));
                        setTimeRemaining(left);
                        if (left === 0) {
                            clearInterval(interval);
                            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { status: 'leaderboard' });
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [game?.status, game?.endTime]);

            const startGame = () => {
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { 
                    status: 'question', endTime: Date.now() + (game.timePerQuestion * 1000) 
                });
            };

            const nextQuestion = () => {
                const nextIdx = game.currentQuestionIndex + 1;
                if (nextIdx >= game.questions.length) {
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { status: 'podium' });
                } else {
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { 
                        status: 'question', currentQuestionIndex: nextIdx, endTime: Date.now() + (game.timePerQuestion * 1000)
                    });
                }
            };

            const generateExplanations = async () => {
                setIsGeneratingReport(true);
                const prompt = `Gere uma resolução explicativa para estas questões: ${JSON.stringify(game.questions)}. Retorne array JSON: [{"explanation": "..."}].`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    const raw = data.candidates[0].content.parts[0].text;
                    const jsonMatch = raw.match(/\[.*\]/s);
                    const expls = JSON.parse(jsonMatch ? jsonMatch[0] : raw);
                    const updated = game.questions.map((q, i) => ({ ...q, explanation: expls[i]?.explanation || "Sem comentário." }));
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { questions: updated, status: 'report' });
                } catch (e) { alert("Erro ao gerar comentários."); }
                finally { setIsGeneratingReport(false); }
            };

            if (step === 'setup') {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg border-t-8 border-purple-500">
                            <h2 className="text-2xl font-black mb-6 flex items-center gap-2 text-gray-800 uppercase tracking-tighter"><Settings className="text-purple-600"/> Configuração</h2>
                            <div className="space-y-4">
                                <div className="bg-purple-50 p-4 rounded-2xl border border-purple-100 shadow-inner">
                                    <div className="flex justify-between text-[10px] font-black text-purple-900 mb-2 uppercase tracking-widest">
                                        <span>Chave Google Gemini</span>
                                        <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-blue-600 underline">Obter grátis</a>
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="Cole aqui a sua chave..." className="flex-1 p-3 border-2 border-purple-100 rounded-xl outline-none focus:border-purple-500 text-sm" />
                                        <button onClick={testApiKey} className="bg-purple-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-purple-700 transition-colors">{keyStatus==='testing' ? '...' : 'Testar'}</button>
                                    </div>
                                    {keyStatus==='valid' && <p className="text-[10px] text-green-600 mt-2 font-black italic">✓ Ligado ao modelo: {activeModel}</p>}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-tight">Disciplina</label>
                                        <input type="text" value={discipline} onChange={(e)=>setDiscipline(e.target.value)} className="p-3 border-2 border-gray-100 rounded-xl text-sm focus:border-purple-400 outline-none" placeholder="Ex: Biologia" />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-tight">Geral</label>
                                        <input type="text" value={generalContent} onChange={(e)=>setGeneralContent(e.target.value)} className="p-3 border-2 border-gray-100 rounded-xl text-sm focus:border-purple-400 outline-none" placeholder="Ex: Célula" />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-tight">Específico</label>
                                        <input type="text" value={specificContent} onChange={(e)=>setSpecificContent(e.target.value)} className="p-3 border-2 border-gray-100 rounded-xl text-sm focus:border-purple-400 outline-none" placeholder="Ex: DNA" />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <select value={numQuestions} onChange={(e)=>setNumQuestions(Number(e.target.value))} className="p-3 border-2 border-gray-100 rounded-xl text-sm font-bold">
                                        <option value={3}>3 Questões</option>
                                        <option value={5}>5 Questões</option>
                                        <option value={10}>10 Questões</option>
                                    </select>
                                    <select value={timePerQuestion} onChange={(e)=>setTimePerQuestion(Number(e.target.value))} className="p-3 border-2 border-gray-100 rounded-xl text-sm font-bold">
                                        <option value={20}>20 seg</option>
                                        <option value={60}>1 min</option>
                                        <option value={300}>5 min</option>
                                    </select>
                                </div>

                                {errorMsg && <p className="text-red-500 text-[11px] font-bold bg-red-50 p-3 rounded-lg border border-red-100 animate-pulse">{errorMsg}</p>}
                                
                                <button onClick={generateQuestions} disabled={isGenerating || keyStatus!=='valid'} className="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl transition-all disabled:bg-gray-200 uppercase tracking-tighter italic">
                                    {isGenerating ? 'A gerar questões...' : 'Abrir Sala'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (game?.status === 'lobby') {
                const joinUrl = `${window.location.origin}${window.location.pathname}?pin=${game.pin}`;
                const qr = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(joinUrl)}`;
                return (
                    <div className="min-h-screen bg-purple-700 text-white flex flex-col items-center justify-center p-6">
                        <div className="flex flex-col md:flex-row gap-10 items-center bg-white/10 p-12 rounded-[3rem] border border-white/20 shadow-2xl backdrop-blur-md">
                            <div className="text-center">
                                <h2 className="text-3xl mb-4 opacity-70 uppercase tracking-widest font-light">PIN DO JOGO</h2>
                                <div className="bg-white text-purple-900 text-8xl md:text-9xl font-black py-6 px-14 rounded-3xl shadow-inner tracking-tighter">
                                    {game.pin}
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-[2rem] shadow-2xl flex flex-col items-center">
                                <img src={qr} className="w-48 h-48 md:w-56 md:h-56" alt="QR Code" />
                                <span className="text-black text-[10px] font-black mt-4 uppercase tracking-widest opacity-30 italic">Digitalize para entrar</span>
                            </div>
                        </div>
                        <div className="mt-14 text-center w-full max-w-3xl">
                            <div className="text-3xl font-black mb-8 flex items-center justify-center gap-3"><Users className="w-8 h-8"/> {players.length} Alunos na Sala</div>
                            <div className="flex flex-wrap gap-3 justify-center">
                                {players.map(p => <span key={p.userId} className="bg-white/15 px-6 py-3 rounded-2xl font-black text-xl border border-white/5 animate-pulse-soft">{p.nickname}</span>)}
                            </div>
                        </div>
                        <button onClick={startGame} disabled={players.length===0} className="mt-12 bg-blue-500 px-16 py-6 rounded-[2rem] font-black text-3xl shadow-[0_8px_0_rgb(30,64,175)] hover:bg-blue-400 active:translate-y-2 active:shadow-none transition-all disabled:opacity-30 uppercase tracking-tighter">
                            COMEÇAR
                        </button>
                    </div>
                );
            }

            if (game?.status === 'question') {
                const q = game.questions[game.currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col">
                        <div className="bg-white p-10 text-center shadow-lg border-b-8 border-gray-200">
                            <h2 className="text-4xl md:text-6xl font-black text-gray-800 tracking-tighter italic">{q.question}</h2>
                        </div>
                        <div className="flex-1 flex items-center justify-center relative">
                            <div className="w-40 h-40 rounded-full border-[12px] border-purple-600 flex items-center justify-center text-5xl font-black text-purple-800 bg-white shadow-2xl">
                                {timeRemaining}
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4 p-4 h-72 md:h-96">
                            {q.options.map((opt, i) => (
                                <div key={i} className={`${SHAPE_COLORS[i]} rounded-3xl flex items-center p-8 gap-6 text-white shadow-xl overflow-hidden relative`}>
                                    <div className="bg-white/20 p-4 rounded-2xl">
                                        {React.createElement(SHAPE_ICONS[i], { className: "w-12 h-12 fill-white shrink-0" })}
                                    </div>
                                    <span className="text-2xl md:text-4xl font-black truncate tracking-tighter">{opt}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (game?.status === 'leaderboard') {
                const sorted = [...players].sort((a,b)=> (b.score||0)-(a.score||0)).slice(0,5);
                const q = game.questions[game.currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-purple-700 flex flex-col items-center p-8 text-white">
                        <div className="bg-white text-gray-800 p-8 rounded-[2.5rem] w-full max-w-2xl mb-12 text-center shadow-2xl border-b-[12px] border-gray-200">
                            <p className="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">Resposta Correta</p>
                            <div className={`${SHAPE_COLORS[q.correctIndex]} p-6 rounded-2xl text-white font-black text-3xl uppercase tracking-tighter`}>
                                {q.options[q.correctIndex]}
                            </div>
                        </div>
                        <h2 className="text-5xl font-black mb-8 tracking-tighter italic uppercase underline decoration-purple-500 decoration-8">Líderes</h2>
                        <div className="bg-white rounded-[2rem] w-full max-w-2xl overflow-hidden shadow-2xl text-gray-800 border-b-8 border-gray-100">
                            {sorted.map((p, i) => (
                                <div key={p.userId} className={`flex justify-between items-center p-6 border-b-2 border-gray-50 ${i===0 ? 'bg-yellow-50' : ''}`}>
                                    <div className="flex items-center gap-4">
                                        <span className="text-gray-300 text-3xl font-black">{i+1}</span>
                                        <span className="text-2xl font-black tracking-tight">{p.nickname}</span>
                                    </div>
                                    <span className="text-3xl font-black text-purple-600">{p.score}</span>
                                </div>
                            ))}
                        </div>
                        <button onClick={nextQuestion} className="mt-12 bg-blue-500 px-16 py-5 rounded-[2rem] font-black text-2xl shadow-xl">PRÓXIMA</button>
                    </div>
                );
            }

            if (game?.status === 'podium') {
                const sorted = [...players].sort((a,b)=> (b.score||0)-(a.score||0));
                return (
                    <div className="min-h-screen bg-purple-900 flex flex-col items-center justify-center p-8 text-white">
                        <Trophy className="w-28 h-28 text-yellow-400 mb-6 drop-shadow-2xl animate-bounce" />
                        <h1 className="text-7xl font-black mb-16 tracking-tighter italic uppercase">Pódio</h1>
                        <div className="flex items-end gap-4 h-80 w-full max-w-2xl mb-16 text-gray-800">
                            {sorted[1] && <div className="flex-1 bg-blue-500 h-40 rounded-t-3xl flex flex-col items-center pt-4 font-bold shadow-2xl border-t-4 border-blue-400 text-white">
                                <span className="text-5xl opacity-30 mb-2">2</span>
                                <span className="text-xl truncate px-2 font-black">{sorted[1].nickname}</span>
                            </div>}
                            {sorted[0] && <div className="flex-1 bg-yellow-500 h-64 rounded-t-3xl flex flex-col items-center pt-4 font-black shadow-2xl border-t-8 border-yellow-300 text-white">
                                <span className="text-6xl opacity-40 mb-2 italic">1</span>
                                <span className="text-2xl truncate px-2">{sorted[0].nickname}</span>
                            </div>}
                            {sorted[2] && <div className="flex-1 bg-green-500 h-32 rounded-t-3xl flex flex-col items-center pt-4 font-bold shadow-2xl border-t-4 border-green-400 text-white">
                                <span className="text-4xl opacity-30 mb-2">3</span>
                                <span className="text-lg truncate px-2 font-black">{sorted[2].nickname}</span>
                            </div>}
                        </div>
                        <div className="flex flex-col sm:flex-row gap-6 text-white">
                            <button onClick={generateExplanations} disabled={isGeneratingReport} className="bg-blue-600 hover:bg-blue-500 px-12 py-5 rounded-[2rem] font-black text-xl flex items-center gap-3 shadow-2xl transition-all disabled:opacity-30">
                                {isGeneratingReport ? <Loader2 className="animate-spin"/> : <BookOpen/>} CORREÇÃO IA
                            </button>
                            <button onClick={onExit} className="bg-white/10 px-10 py-5 rounded-[2rem] font-bold border border-white/5">VOLTAR</button>
                        </div>
                    </div>
                );
            }

            if (game?.status === 'report') {
                return (
                    <div className="min-h-screen bg-gray-50 p-6 overflow-y-auto">
                        <div className="max-w-4xl mx-auto pb-20">
                            <div className="flex justify-between items-center mb-10 bg-white p-8 rounded-[2.5rem] shadow-sm">
                                <h1 className="text-4xl font-black text-purple-800 italic uppercase"><BookOpen className="inline w-10 h-10 mr-2"/> Relatório</h1>
                                <button onClick={onExit} className="bg-red-500 text-white px-8 py-3 rounded-2xl font-black">Sair</button>
                            </div>
                            <div className="space-y-10">
                                {game.questions.map((q, i) => (
                                    <div key={i} className="bg-white p-10 rounded-[3rem] shadow-md border-l-[16px] border-purple-500">
                                        <p className="text-2xl font-black mb-8 text-gray-800 leading-tight italic">{i+1}. {q.question}</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
                                            {q.options.map((opt, oi) => (
                                                <div key={oi} className={`p-5 rounded-2xl border-2 ${oi===q.correctIndex ? 'bg-green-50 border-green-500 font-black text-green-800' : 'border-gray-50 text-gray-300 italic'}`}>
                                                    {opt}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="bg-purple-50 p-8 rounded-[2rem] text-lg leading-relaxed text-purple-900 border border-purple-100">
                                            <div className="flex items-center gap-2 font-black text-[10px] uppercase mb-4 opacity-40 tracking-widest"><GraduationCap className="w-5 h-5"/> Resolução</div>
                                            {q.explanation}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        }

        function StudentView({ user, onExit }) {
            const [pin, setPin] = useState('');
            const [nickname, setNickname] = useState('');
            const [game, setGame] = useState(null);
            const [playerDocId, setPlayerDocId] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [myScore, setMyScore] = useState(0);
            const [myAnswers, setMyAnswers] = useState({});
            const [hasAnswered, setHasAnswered] = useState(false);
            const [answerResult, setAnswerResult] = useState(null);

            useEffect(() => {
                const urlPin = new URLSearchParams(window.location.search).get('pin');
                if (urlPin) setPin(urlPin);
            }, []);

            const join = async (e) => {
                e.preventDefault();
                if (!pin || !nickname) return;
                try {
                    const gameSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin));
                    if (!gameSnap.exists()) {
                        setErrorMsg("Este PIN não existe.");
                        return;
                    }

                    const id = `${pin}_${user.uid}`;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), {
                        gameId: pin, userId: user.uid, nickname, score: 0, answers: {}
                    });
                    setPlayerDocId(id);
                    setGame({ pin });
                } catch (e) { 
                    setErrorMsg("Erro ao ligar ao servidor."); 
                }
            };

            useEffect(() => {
                if (!game?.pin || !playerDocId) return;
                const unsubGame = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), (snap) => {
                    if (snap.exists()) setGame(snap.data());
                });
                const unsubPlayer = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'players', playerDocId), (snap) => {
                    if (snap.exists()) {
                        setMyScore(snap.data().score || 0);
                        setMyAnswers(snap.data().answers || {});
                    }
                });
                return () => { unsubGame(); unsubPlayer(); };
            }, [game?.pin, playerDocId]);

            useEffect(() => { setHasAnswered(false); setAnswerResult(null); }, [game?.currentQuestionIndex, game?.status]);

            const submit = async (idx) => {
                if (hasAnswered || game?.status !== 'question') return;
                setHasAnswered(true);
                const q = game.questions[game.currentQuestionIndex];
                const correct = idx === q.correctIndex;
                const bonus = correct ? Math.round(500 * (1 - (Date.now() - (game.endTime - game.timePerQuestion*1000))/(game.timePerQuestion*1000))) : 0;
                setAnswerResult(correct ? 'correct' : 'incorrect');
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', playerDocId), {
                    score: myScore + (correct ? (500 + Math.max(0, bonus)) : 0),
                    [`answers.${game.currentQuestionIndex}`]: { optionIndex: idx, correct }
                });
            };

            if (!game?.status) {
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
                        <form onSubmit={join} className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm">
                            <h2 className="text-3xl font-black mb-8 text-center text-gray-800 italic">Entrar</h2>
                            <div className="space-y-4">
                                <input type="text" placeholder="PIN" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full text-center text-5xl font-black p-6 border-4 border-gray-100 rounded-[2rem] focus:border-blue-500 outline-none" maxLength="6" />
                                <input type="text" placeholder="APELIDO" value={nickname} onChange={(e)=>setNickname(e.target.value)} className="w-full text-center font-black p-4 border-2 border-gray-100 rounded-2xl outline-none" maxLength="12" />
                            </div>
                            {errorMsg && <p className="text-red-500 text-xs text-center mt-6 font-bold uppercase italic">{errorMsg}</p>}
                            <button className="w-full mt-10 bg-blue-600 text-white py-6 rounded-[2rem] font-black text-2xl shadow-xl uppercase tracking-tighter">Jogar!</button>
                        </form>
                    </div>
                );
            }

            if (game.status === 'lobby') return <div className="min-h-screen bg-green-500 flex flex-col items-center justify-center p-8 text-white"><h1 className="text-6xl font-black mb-4 animate-bounce italic">Estás dentro!</h1></div>;

            if (game.status === 'question') {
                if (hasAnswered) return <div className="min-h-screen bg-purple-700 flex flex-col items-center justify-center text-white"><p className="font-black text-4xl uppercase italic opacity-40 animate-pulse">Enviado!</p></div>;
                return (
                    <div className="min-h-screen grid grid-cols-2 grid-rows-2 gap-3 p-3 bg-gray-200">
                        {[0,1,2,3].map(i => (
                            <button key={i} onClick={()=>submit(i)} className={`${SHAPE_COLORS[i]} rounded-[2.5rem] flex items-center justify-center shadow-xl active:scale-90 transition-all border-b-[12px] border-black/10`}>
                                {React.createElement(SHAPE_ICONS[i], {className: "w-32 h-32 fill-white drop-shadow-lg"})}
                            </button>
                        ))}
                    </div>
                );
            }

            if (game.status === 'leaderboard') return <div className={`min-h-screen flex flex-col items-center justify-center text-white ${answerResult==='correct'?'bg-green-500':'bg-red-500'}`}>
                <h1 className="text-[10rem] font-black mb-6 animate-pulse italic">{answerResult==='correct'?'SIM!':'OH!'}</h1>
            </div>;

            if (game.status === 'podium') return <div className="min-h-screen bg-purple-900 flex flex-col items-center justify-center text-white p-8"><h1 className="text-5xl font-black mb-10 uppercase italic opacity-50 text-center leading-none">Fim de Jogo</h1><div className="bg-white/10 p-12 rounded-[3rem] border border-white/10 shadow-2xl backdrop-blur-md text-center"><p className="text-8xl font-black text-white tracking-tighter">{myScore}</p></div></div>;

            if (game.status === 'report') {
                return (
                    <div className="min-h-screen bg-gray-100 p-6 overflow-y-auto">
                        <div className="max-w-xl mx-auto pb-20">
                            <h1 className="text-3xl font-black mb-8 text-purple-900 italic uppercase">Correção</h1>
                            <div className="space-y-6">
                                {game.questions.map((q, i) => (
                                    <div key={i} className={`bg-white p-8 rounded-[2.5rem] shadow-lg border-2 ${myAnswers[i]?.correct ? 'border-green-100' : 'border-red-100'}`}>
                                        <div className="flex justify-between items-start gap-4 mb-6">
                                            <p className="font-black text-xl leading-tight tracking-tight italic">{i+1}. {q.question}</p>
                                            <div className={`shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-2xl ${myAnswers[i]?.correct ? 'bg-green-500 text-white' : 'bg-red-500 text-white shadow-lg'}`}>{myAnswers[i]?.correct ? '✓' : '✗'}</div>
                                        </div>
                                        <div className="bg-purple-50 p-6 rounded-2xl text-sm leading-relaxed text-gray-700 border border-purple-100 italic">
                                            {q.explanation}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={onExit} className="w-full mt-10 bg-gray-900 text-white py-6 rounded-[2rem] font-black text-2xl">Sair</button>
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
