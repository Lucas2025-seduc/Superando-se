<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superando-se</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Maps para carregar React, Lucide Icons e Firebase no navegador -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 font-sans selection:bg-purple-300">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc } from 'firebase/firestore';
        import { Triangle, Square, Circle, Hexagon, Trophy, Users, Play, Loader2, Key, CheckCircle2, XCircle, Beaker, BookOpen, GraduationCap, Settings } from 'lucide-react';

        // --- CONFIGURAÇÃO FIREBASE FINAL (Baseada nas suas fotos) ---
        const myFirebaseConfig = {
            apiKey: "AIzaSyCQg38W6tun8YK9QALtnL1AAkUlV5q-dVs",
            authDomain: "superando-se.firebaseapp.com",
            projectId: "Superando", // Corrigido para corresponder à sua imagem image_88b387.png
            storageBucket: "superando-se.firebasestorage.app",
            messagingSenderId: "635704160880",
            appId: "1:635704160880:web:bf03fbddcabdf527a63ab5",
            measurementId: "G-8ZXRL0SVRE"
        };

        let app, auth, db, appId;
        try {
            // Se estiver no Vercel ou produção, usa myFirebaseConfig
            const finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
            
            app = initializeApp(finalConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'edu-kahoot-app';
        } catch (error) {
            console.error("Erro ao inicializar Firebase:", error);
        }

        const SHAPE_COLORS = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-green-500'];
        const SHAPE_ICONS = [Triangle, Hexagon, Circle, Square];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [authError, setAuthError] = useState('');
            
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('pin')) setView('student');
            }, []);

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Erro Autenticação:", err);
                        if (err.code === 'auth/operation-not-allowed') {
                            setAuthError("Ative o 'Login Anónimo' no Firebase Console!");
                        } else {
                            setAuthError("Erro de ligação: " + err.message);
                        }
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            if (authError) {
                return (
                    <div className="min-h-screen bg-red-900 flex flex-col items-center justify-center text-white p-6 text-center">
                        <XCircle className="w-20 h-20 mb-6" />
                        <h1 className="text-2xl font-bold mb-4">Erro de Configuração</h1>
                        <p className="bg-red-800 p-4 rounded-lg">{authError}</p>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen bg-purple-900 flex flex-col items-center justify-center text-white">
                        <Loader2 className="w-12 h-12 animate-spin mb-4" />
                        <p className="animate-pulse">A ligar ao Superando-se...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {view === 'home' && <HomeView setView={setView} />}
                    {view === 'host' && <HostView user={user} onExit={() => setView('home')} />}
                    {view === 'student' && <StudentView user={user} onExit={() => setView('home')} />}
                </div>
            );
        }

        function HomeView({ setView }) {
            return (
                <div className="min-h-screen bg-purple-600 flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
                        <div className="flex justify-center mb-4">
                            <GraduationCap className="w-16 h-16 text-purple-600" />
                        </div>
                        <h1 className="text-4xl font-extrabold text-gray-800 mb-1 tracking-tight">Superando-se</h1>
                        <p className="text-sm text-gray-500 font-medium mb-8">uma proposta do professor Lucas Sebastião Barbosa Silva</p>
                        
                        <div className="space-y-4">
                            <button onClick={() => setView('student')} className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-[0_4px_0_rgb(37,99,235)] active:translate-y-1 active:shadow-none transition-all text-xl">
                                Entrar como Aluno
                            </button>
                            <button onClick={() => setView('host')} className="w-full bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold py-4 rounded-xl shadow-[0_4px_0_rgb(216,180,254)] active:translate-y-1 active:shadow-none transition-all text-lg">
                                Sou Professor (Criar Sala)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function HostView({ user, onExit }) {
            const [step, setStep] = useState('setup');
            const [apiKey, setApiKey] = useState('');
            const [keyStatus, setKeyStatus] = useState('idle');
            const [activeModel, setActiveModel] = useState(null);
            const [discipline, setDiscipline] = useState('');
            const [generalContent, setGeneralContent] = useState('');
            const [specificContent, setSpecificContent] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [timePerQuestion, setTimePerQuestion] = useState(20);
            const [examModel, setExamModel] = useState('ENEM');
            const [difficultyLevel, setDifficultyLevel] = useState('Ensino Médio');
            const [numQuestions, setNumQuestions] = useState(5);
            const [game, setGame] = useState(null);
            const [players, setPlayers] = useState([]);
            const [timeRemaining, setTimeRemaining] = useState(0);

            const testApiKey = async () => {
                if (!apiKey.trim()) return setErrorMsg("Insira a chave Gemini.");
                setKeyStatus('testing');
                setErrorMsg('');
                const models = ['gemini-2.5-flash', 'gemini-1.5-pro', 'gemini-1.5-flash'];
                let working = null;
                for (const m of models) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}?key=${apiKey.trim()}`);
                        if (res.ok) { working = m; break; }
                    } catch (e) {}
                }
                if (working) { setActiveModel(working); setKeyStatus('valid'); }
                else { setKeyStatus('invalid'); setErrorMsg("Chave Gemini inválida."); }
            };

            const generateQuestions = async () => {
                if (!activeModel || keyStatus !== 'valid') return setErrorMsg("Valide a chave primeiro.");
                if (!discipline || !generalContent || !specificContent) return setErrorMsg("Preencha os campos de assunto.");
                
                setIsGenerating(true);
                setErrorMsg('');

                const prompt = `Atue como professor de "${discipline}". Gere ${numQuestions} questões de múltipla escolha (${difficultyLevel}, estilo ${examModel}). 
                Assunto: "${generalContent}" - "${specificContent}". 
                Retorne apenas um array JSON: [{"question": "...", "options": ["A","B","C","D"], "correctIndex": 0}].`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!res.ok) throw new Error("Erro na IA.");
                    const data = await res.json();
                    const raw = data.candidates[0].content.parts[0].text;
                    const json = JSON.parse(raw.replace(/```json/g, '').replace(/```/g, '').trim());

                    const pin = Math.floor(100000 + Math.random() * 900000).toString();
                    const gameData = {
                        pin, hostId: user.uid, status: 'lobby', questions: json, 
                        currentQuestionIndex: 0, timePerQuestion: Number(timePerQuestion),
                        createdAt: Date.now(), context: { discipline, generalContent }
                    };

                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', pin), gameData);
                    setGame(gameData);
                    setStep('lobby');
                } catch (err) {
                    setErrorMsg("Erro ao criar sala: Verifique se as Regras do Firebase estão como 'true'.");
                } finally {
                    setIsGenerating(false);
                }
            };

            useEffect(() => {
                if (!game?.pin) return;
                const unsubGame = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), (snap) => {
                    if (snap.exists()) setGame(snap.data());
                });
                const unsubPlayers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                    setPlayers(snap.docs.map(d => d.data()).filter(p => p.gameId === game.pin));
                });
                return () => { unsubGame(); unsubPlayers(); };
            }, [game?.pin]);

            useEffect(() => {
                let interval;
                if (game?.status === 'question' && game?.endTime) {
                    interval = setInterval(() => {
                        const left = Math.max(0, Math.ceil((game.endTime - Date.now()) / 1000));
                        setTimeRemaining(left);
                        if (left === 0) {
                            clearInterval(interval);
                            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { status: 'leaderboard' });
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [game?.status, game?.endTime]);

            const startGame = () => {
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { 
                    status: 'question', endTime: Date.now() + (game.timePerQuestion * 1000) 
                });
            };

            const nextQuestion = () => {
                const nextIdx = game.currentQuestionIndex + 1;
                if (nextIdx >= game.questions.length) {
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { status: 'podium' });
                } else {
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { 
                        status: 'question', currentQuestionIndex: nextIdx, endTime: Date.now() + (game.timePerQuestion * 1000)
                    });
                }
            };

            const generateExplanations = async () => {
                setIsGeneratingReport(true);
                const prompt = `Gere explicações didáticas para estas questões: ${JSON.stringify(game.questions)}. Retorne array JSON: [{"explanation": "..."}].`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    const expls = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim());
                    const updated = game.questions.map((q, i) => ({ ...q, explanation: expls[i]?.explanation || "Sem comentário." }));
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), { questions: updated, status: 'report' });
                } catch (e) { alert("Erro na correção."); }
                finally { setIsGeneratingReport(false); }
            };

            if (step === 'setup') {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg">
                            <h2 className="text-2xl font-bold mb-6 flex items-center gap-2 text-gray-800"><Settings className="text-purple-600"/> Configuração</h2>
                            <div className="space-y-4">
                                <div className="bg-purple-50 p-4 rounded-xl border border-purple-100">
                                    <div className="flex justify-between text-[10px] font-bold text-purple-900 mb-1">
                                        <span>CHAVE GOOGLE GEMINI</span>
                                        <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-blue-600 underline">Obter chave</a>
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="AIza..." className="flex-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-purple-400" />
                                        <button onClick={testApiKey} className="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-bold">{keyStatus==='testing' ? '...' : 'Testar'}</button>
                                    </div>
                                    {keyStatus==='valid' && <p className="text-[10px] text-green-600 mt-1 font-bold">✓ Conectado: {activeModel}</p>}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                    <input type="text" placeholder="Disciplina" value={discipline} onChange={(e)=>setDiscipline(e.target.value)} className="p-2 border rounded-lg text-sm" />
                                    <input type="text" placeholder="Geral" value={generalContent} onChange={(e)=>setGeneralContent(e.target.value)} className="p-2 border rounded-lg text-sm" />
                                    <input type="text" placeholder="Específico" value={specificContent} onChange={(e)=>setSpecificContent(e.target.value)} className="p-2 border rounded-lg text-sm" />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <select value={numQuestions} onChange={(e)=>setNumQuestions(Number(e.target.value))} className="p-2 border rounded-lg text-sm"><option value={3}>3 Questões</option><option value={5}>5 Questões</option><option value={10}>10 Questões</option></select>
                                    <select value={timePerQuestion} onChange={(e)=>setTimePerQuestion(Number(e.target.value))} className="p-2 border rounded-lg text-sm"><option value={20}>20 seg</option><option value={60}>1 min</option><option value={300}>5 min</option></select>
                                </div>
                                {errorMsg && <p className="text-red-500 text-xs font-bold">{errorMsg}</p>}
                                <button onClick={generateQuestions} disabled={isGenerating || keyStatus!=='valid'} className="w-full bg-green-500 text-white py-3 rounded-xl font-bold shadow-md hover:bg-green-600 disabled:bg-gray-300">
                                    {isGenerating ? 'A gerar questões...' : 'Criar Sala'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (game?.status === 'lobby') {
                const joinUrl = `${window.location.origin}${window.location.pathname}?pin=${game.pin}`;
                const qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(joinUrl)}`;
                return (
                    <div className="min-h-screen bg-purple-700 text-white flex flex-col items-center justify-center p-8">
                        <div className="flex flex-col md:flex-row gap-8 items-center bg-white/10 p-12 rounded-3xl border border-white/20 shadow-2xl">
                            <div className="text-center">
                                <h2 className="text-2xl mb-2 opacity-80 uppercase tracking-widest font-light">Pin da Sala</h2>
                                <div className="bg-white text-purple-900 text-8xl font-black py-4 px-10 rounded-2xl shadow-inner">{game.pin}</div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-2xl flex flex-col items-center">
                                <img src={qr} className="w-40 h-40" alt="QR Code" />
                                <span className="text-black text-[10px] font-bold mt-2">DIGITALIZE PARA ENTRAR</span>
                            </div>
                        </div>
                        <div className="mt-12 text-center w-full max-w-2xl">
                            <div className="text-2xl font-bold mb-6 flex items-center justify-center gap-2"><Users/> {players.length} Jogadores</div>
                            <div className="flex flex-wrap gap-2 justify-center">
                                {players.map(p => <span key={p.userId} className="bg-white/20 px-4 py-2 rounded-full font-bold">{p.nickname}</span>)}
                            </div>
                        </div>
                        <button onClick={startGame} disabled={players.length===0} className="mt-10 bg-blue-500 px-12 py-5 rounded-2xl font-black text-2xl shadow-xl hover:scale-105 transition-transform disabled:opacity-50">INICIAR</button>
                    </div>
                );
            }

            if (game?.status === 'question') {
                const q = game.questions[game.currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col">
                        <div className="bg-white p-8 text-center shadow-lg"><h2 className="text-3xl md:text-5xl font-black text-gray-800">{q.question}</h2></div>
                        <div className="flex-1 flex items-center justify-center">
                            <div className="w-32 h-32 rounded-full border-[10px] border-purple-600 flex items-center justify-center text-4xl font-black text-purple-800 bg-white shadow-xl">{timeRemaining}</div>
                        </div>
                        <div className="grid grid-cols-2 gap-4 p-4 h-72 md:h-80">
                            {q.options.map((opt, i) => (
                                <div key={i} className={`${SHAPE_COLORS[i]} rounded-2xl flex items-center p-6 gap-4 text-white shadow-xl`}>
                                    {React.createElement(SHAPE_ICONS[i], { className: "w-10 h-10 fill-white shrink-0" })}
                                    <span className="text-xl md:text-2xl font-bold">{opt}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (game?.status === 'leaderboard') {
                const sorted = [...players].sort((a,b)=> (b.score||0)-(a.score||0)).slice(0,5);
                const q = game.questions[game.currentQuestionIndex];
                return (
                    <div className="min-h-screen bg-purple-700 flex flex-col items-center p-8 text-white">
                        <div className="bg-white text-gray-800 p-6 rounded-2xl w-full max-w-xl mb-8 text-center shadow-2xl border-b-8 border-gray-200">
                            <p className="text-xs font-black text-gray-400 uppercase mb-2">Resposta Correta</p>
                            <div className={`${SHAPE_COLORS[q.correctIndex]} p-4 rounded-xl text-white font-black text-2xl`}>{q.options[q.correctIndex]}</div>
                        </div>
                        <h2 className="text-4xl font-black mb-6 tracking-tighter italic">LÍDERES</h2>
                        <div className="bg-white rounded-2xl w-full max-w-xl overflow-hidden shadow-2xl">
                            {sorted.map((p, i) => (
                                <div key={p.userId} className="flex justify-between p-5 border-b text-gray-800 font-bold text-xl hover:bg-gray-50 transition-colors">
                                    <span>{i+1}. {p.nickname}</span>
                                    <span className="text-purple-600 font-black">{p.score}</span>
                                </div>
                            ))}
                        </div>
                        <button onClick={nextQuestion} className="mt-8 bg-blue-500 px-12 py-4 rounded-xl font-black text-xl shadow-xl">PRÓXIMA</button>
                    </div>
                );
            }

            if (game?.status === 'podium') {
                const sorted = [...players].sort((a,b)=> (b.score||0)-(a.score||0));
                return (
                    <div className="min-h-screen bg-purple-900 flex flex-col items-center justify-center p-8 text-white">
                        <Trophy className="w-24 h-24 text-yellow-400 mb-6 drop-shadow-lg animate-bounce" />
                        <h1 className="text-6xl font-black mb-12 tracking-tight">PÓDIO</h1>
                        <div className="flex items-end gap-3 h-64 w-full max-w-lg mb-12">
                            {sorted[1] && <div className="flex-1 bg-blue-500 h-32 rounded-t-2xl flex flex-col items-center pt-2 font-bold shadow-lg border-x border-t border-blue-400"><span>2º</span><span className="text-xs truncate px-1">{sorted[1].nickname}</span></div>}
                            {sorted[0] && <div className="flex-1 bg-yellow-500 h-52 rounded-t-2xl flex flex-col items-center pt-2 font-black shadow-2xl text-xl border-x border-t border-yellow-300"><span>1º</span><span className="text-sm truncate px-1">{sorted[0].nickname}</span></div>}
                            {sorted[2] && <div className="flex-1 bg-green-500 h-24 rounded-t-2xl flex flex-col items-center pt-2 font-bold shadow-lg border-x border-t border-green-400"><span>3º</span><span className="text-xs truncate px-1">{sorted[2].nickname}</span></div>}
                        </div>
                        <div className="flex gap-4">
                            <button onClick={generateExplanations} disabled={isGeneratingReport} className="bg-blue-600 px-8 py-4 rounded-2xl font-black text-lg flex items-center gap-2 shadow-xl">
                                {isGeneratingReport ? <Loader2 className="animate-spin"/> : <BookOpen/>} GERAR CORREÇÃO
                            </button>
                            <button onClick={onExit} className="bg-white/10 px-8 py-4 rounded-2xl font-bold">SAIR</button>
                        </div>
                    </div>
                );
            }

            if (game?.status === 'report') {
                return (
                    <div className="min-h-screen bg-gray-50 p-6">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                <h1 className="text-3xl font-black text-purple-800 flex items-center gap-3"><BookOpen className="w-8 h-8"/> RELATÓRIO</h1>
                                <button onClick={onExit} className="bg-red-500 text-white px-6 py-2 rounded-xl font-bold">FECHAR</button>
                            </div>
                            <div className="space-y-6">
                                {game.questions.map((q, i) => (
                                    <div key={i} className="bg-white p-8 rounded-3xl shadow-md border-l-[12px] border-purple-500">
                                        <p className="text-xl font-black mb-6 text-gray-800">{i+1}. {q.question}</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
                                            {q.options.map((opt, oi) => (
                                                <div key={oi} className={`p-4 rounded-2xl border-2 transition-all ${oi===q.correctIndex ? 'bg-green-50 border-green-500 font-black text-green-800' : 'border-gray-100 text-gray-400 italic'}`}>{opt}</div>
                                            ))}
                                        </div>
                                        <div className="bg-purple-50 p-6 rounded-2xl text-base leading-relaxed text-purple-900 border border-purple-100 shadow-inner">
                                            <div className="flex items-center gap-2 font-black text-xs uppercase mb-2 opacity-50"><GraduationCap className="w-4 h-4"/> Resolução Comentada</div>
                                            {q.explanation}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        }

        function StudentView({ user, onExit }) {
            const [pin, setPin] = useState('');
            const [nickname, setNickname] = useState('');
            const [game, setGame] = useState(null);
            const [playerDocId, setPlayerDocId] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [myScore, setMyScore] = useState(0);
            const [myAnswers, setMyAnswers] = useState({});
            const [hasAnswered, setHasAnswered] = useState(false);
            const [answerResult, setAnswerResult] = useState(null);

            useEffect(() => {
                const urlPin = new URLSearchParams(window.location.search).get('pin');
                if (urlPin) setPin(urlPin);
            }, []);

            const join = async (e) => {
                e.preventDefault();
                if (!pin || !nickname) return;
                try {
                    const id = `${pin}_${user.uid}`;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), {
                        gameId: pin, userId: user.uid, nickname, score: 0, answers: {}
                    });
                    setPlayerDocId(id);
                    setGame({ pin });
                } catch (e) { setErrorMsg("Erro ao entrar. Verifique o PIN."); }
            };

            useEffect(() => {
                if (!game?.pin || !playerDocId) return;
                const unsubGame = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'games', game.pin), (snap) => {
                    if (snap.exists()) setGame(snap.data());
                });
                const unsubPlayer = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'players', playerDocId), (snap) => {
                    if (snap.exists()) {
                        setMyScore(snap.data().score || 0);
                        setMyAnswers(snap.data().answers || {});
                    }
                });
                return () => { unsubGame(); unsubPlayer(); };
            }, [game?.pin, playerDocId]);

            useEffect(() => { setHasAnswered(false); setAnswerResult(null); }, [game?.currentQuestionIndex, game?.status]);

            const submit = async (idx) => {
                if (hasAnswered || game?.status !== 'question') return;
                setHasAnswered(true);
                const q = game.questions[game.currentQuestionIndex];
                const correct = idx === q.correctIndex;
                const basePoints = 500;
                const bonus = correct ? Math.round(500 * (1 - (Date.now() - (game.endTime - game.timePerQuestion*1000))/(game.timePerQuestion*1000))) : 0;
                setAnswerResult(correct ? 'correct' : 'incorrect');
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', playerDocId), {
                    score: myScore + (correct ? (basePoints + Math.max(0, bonus)) : 0),
                    [`answers.${game.currentQuestionIndex}`]: { optionIndex: idx, correct }
                });
            };

            if (!game?.status) {
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
                        <form onSubmit={join} className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm">
                            <h2 className="text-3xl font-black mb-8 text-center text-gray-800">SUPERANDO-SE</h2>
                            <input type="text" placeholder="PIN DO JOGO" value={pin} onChange={(e)=>setPin(e.target.value)} className="w-full text-center text-5xl font-black p-5 border-4 border-gray-100 rounded-2xl mb-4 focus:border-blue-500 outline-none transition-colors" maxLength="6" />
                            <input type="text" placeholder="TEU APELIDO" value={nickname} onChange={(e)=>setNickname(e.target.value)} className="w-full text-center font-black p-4 border-2 border-gray-100 rounded-xl mb-6 outline-none" maxLength="12" />
                            {errorMsg && <p className="text-red-500 text-xs text-center mb-4 font-bold">{errorMsg}</p>}
                            <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-blue-700 transition-colors">VAMOS LÁ!</button>
                        </form>
                    </div>
                );
            }

            if (game.status === 'lobby') return <div className="min-h-screen bg-green-500 flex flex-col items-center justify-center p-8 text-white"><h1 className="text-5xl font-black mb-4 animate-pulse uppercase">DENTRO!</h1><p className="text-xl font-bold opacity-80">Vê o teu nome no ecrã do professor.</p></div>;

            if (game.status === 'question') {
                if (hasAnswered) return <div className="min-h-screen bg-purple-700 flex flex-col items-center justify-center text-white"><Loader2 className="animate-spin w-16 h-16 opacity-30 mb-4" /><p className="font-black text-2xl uppercase tracking-widest italic opacity-50">Enviado!</p></div>;
                return (
                    <div className="min-h-screen grid grid-cols-2 grid-rows-2 gap-2 p-2 bg-gray-200">
                        {[0,1,2,3].map(i => <button key={i} onClick={()=>submit(i)} className={`${SHAPE_COLORS[i]} rounded-3xl flex items-center justify-center shadow-xl active:scale-95 transition-transform`}>{React.createElement(SHAPE_ICONS[i], {className: "w-28 h-28 fill-white"})}</button>)}
                    </div>
                );
            }

            if (game.status === 'leaderboard') return <div className={`min-h-screen flex flex-col items-center justify-center text-white transition-colors duration-500 ${answerResult==='correct'?'bg-green-500':'bg-red-500'}`}><h1 className="text-8xl font-black mb-4">{answerResult==='correct'?'SIM!':'NÃO!'}</h1><p className="text-2xl font-bold opacity-80 uppercase tracking-widest">Total: {myScore} pts</p></div>;

            if (game.status === 'podium') return <div className="min-h-screen bg-purple-900 flex flex-col items-center justify-center text-white p-8"><h1 className="text-4xl font-black mb-4 uppercase tracking-tighter italic">Acabou!</h1><div className="bg-white/10 p-10 rounded-3xl border border-white/10 shadow-2xl backdrop-blur-md text-center"><p className="font-bold text-purple-300 uppercase text-xs mb-2">Tua Pontuação</p><p className="text-7xl font-black text-white">{myScore}</p></div></div>;

            if (game.status === 'report') {
                return (
                    <div className="min-h-screen bg-gray-100 p-6 overflow-y-auto">
                        <div className="max-w-2xl mx-auto">
                            <h1 className="text-3xl font-black mb-8 text-purple-900 italic">TEU DESEMPENHO</h1>
                            <div className="space-y-6">
                                {game.questions.map((q, i) => (
                                    <div key={i} className="bg-white p-8 rounded-3xl shadow-lg border-2 border-gray-100">
                                        <div className="flex justify-between items-start gap-4 mb-4">
                                            <p className="font-black text-xl leading-tight">{i+1}. {q.question}</p>
                                            <div className={`shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${myAnswers[i]?.correct ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>{myAnswers[i]?.correct ? '✓' : '✗'}</div>
                                        </div>
                                        <div className="p-4 bg-purple-50 rounded-2xl text-sm leading-relaxed border border-purple-100 italic shadow-inner">{q.explanation}</div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={onExit} className="w-full mt-10 bg-gray-900 text-white py-5 rounded-2xl font-black text-xl shadow-2xl">SAIR</button>
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
